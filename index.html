<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Spendora — Personal Finance Dashboard</title>
    <link rel="icon" href="favicon.png">
    <!-- Google Font (Professional Look) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="app-layout">

        <aside class="sidebar">
            <h2>NexLedger</h2>
            <ul>
                <li class="active">Dashboard</li>
                <li>Analytics</li>
                <li>Reports</li>
                <li>Settings</li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="container">
                <div class="top-bar">
                    <h1>Dashboard</h1>

                    <div class="top-actions">
                        <button id="themeToggle" class="theme-toggle">🌙</button>
                        <div class="user-box">Welcome, Dev</div>
                    </div>
                </div>
                <section class="dashboard-section">

                    <div class="top-section">

                        <!-- Budget Card -->
                        <div class="budget-section">

                            <h3>Monthly Budget</h3>

                            <input type="number" id="budgetInput" placeholder="Set Budget">
                            <button id="setBudgetBtn">Set Budget</button>

                            <!-- Budget Progress Bar -->
                            <div class="budget-progress">
                                <div id="budgetBar" class="budget-bar"></div>
                            </div>

                        </div>

                        <!-- Summary Cards -->
                        <div class="summary">

                            <div class="card">
                                <h3>Total Balance</h3>
                                <p id="balance">₹0</p>
                            </div>

                            <div class="card income">
                                <h3>Total Income</h3>
                                <p id="income">₹0</p>
                            </div>

                            <div class="card expense">
                                <h3>Total Expense</h3>
                                <p id="expense">₹0</p>
                            </div>

                        </div>

                    </div>

                </section>
                <section class="analytics-section">

                    <div class="chart-card">
                        <h3>Expense Breakdown</h3>
                        <canvas id="expenseChart"></canvas>
                    </div>

                </section>
                <section class="form-section">

                    <form id="transactionForm">

                        <input type="text" id="description" placeholder="Description" required>

                        <input type="number" id="amount" placeholder="Amount" required>

                        <select id="type">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>

                        <select id="category">
                            <option value="Salary">Salary</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Other">Other</option>
                        </select>

                        <input type="date" id="date" required>

                        <button type="submit">Add</button>

                    </form>

                </section>
                <section class="transaction-section">

                    <h2>Transactions</h2>

                    <div class="filters">
                        <input type="text" id="searchInput" placeholder="Search description...">

                        <select id="filterCategory">
                            <option value="all">All Categories</option>
                            <option value="Salary">Salary</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Other">Other</option>
                        </select>

                        <select id="sortBy">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="high">Amount High → Low</option>
                            <option value="low">Amount Low → High</option>
                        </select>
                    </div>

                    <table>
                        <thead>
                            <tr>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="transactionList"></tbody>
                    </table>

                </section>

            </div>

        </main>

    </div>
    <script src="app.js"></script>

</body>

</html>
